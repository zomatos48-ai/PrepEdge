# ─── Server ───────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:5432/${POSTGRES_DB:prepedge}
spring.datasource.username=${POSTGRES_USER:${DB_USERNAME:prepedge_user}}
spring.datasource.password=${POSTGRES_PASSWORD:${DB_PASSWORD:prepedge123}}

spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── JWT ──────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:prepedge-super-secret-key-change-in-production-256bits}
jwt.expiration=86400000

# ─── Logging ──────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.com.prepedge=DEBUG

# ─── Mail (Gmail SMTP) ────────────────────────────────────
# Set MAIL_USERNAME = your Gmail address
# Set MAIL_PASSWORD = 16-char Gmail App Password (not your real password)
# Generate at: https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply.prepedge@gmail.com}
spring.mail.password=${MAIL_PASSWORD:ttyvaqpzikknqkbg}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true