# ─── Server ───────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:5432/${POSTGRES_DB:prepedge}
spring.datasource.username=${POSTGRES_USER:${DB_USERNAME:prepedge_user}}
spring.datasource.password=${POSTGRES_PASSWORD:${DB_PASSWORD:prepedge123}}

spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── JWT ──────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:prepedge-super-secret-key-change-in-production-256bits}
jwt.expiration=86400000

# ─── Logging ──────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.com.prepedge=DEBUG

# ─── Mail (Brevo HTTP API) ────────────────────────────────
# SMTP is blocked by Railway — using Brevo REST API instead
# Set BREVO_API_KEY in Railway variables (get from Brevo dashboard → SMTP & API → API Keys)
# Set MAIL_USERNAME = verified sender email in Brevo
brevo.api.key=${BREVO_API_KEY:}
spring.mail.username=${MAIL_USERNAME:noreply.prepedge@gmail.com}
# Disable Spring mail autoconfiguration (not using SMTP)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration