# ─── Server ───────────────────────────────────────────────
server.port=8080

# ─── Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/prepedge
spring.datasource.username=${DB_USERNAME:prepedge_user}
spring.datasource.password=${DB_PASSWORD:prepedge123}

spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── JWT ──────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:prepedge-super-secret-key-change-in-production-256bits}
jwt.expiration=86400000

# ─── Logging ──────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.com.prepedge=DEBUG